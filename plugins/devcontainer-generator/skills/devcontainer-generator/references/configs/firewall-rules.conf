# =============================================================================
# Development Container Firewall Rules
# =============================================================================
# Syntax: ACTION TARGET
#   ACTION: ALLOW or DENY
#   TARGET: domain | *.domain (wildcard) | CIDR | IPv4 | IPv6 | * (all)
#
# Rules are evaluated top-to-bottom, first match wins.
# The last rule should be a catch-all: DENY * (isolated) or ALLOW * (open).
# Root (uid 0) is always exempt from these rules.
# Lines starting with # are comments.
# =============================================================================

