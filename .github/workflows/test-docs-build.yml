name: Test Documentation Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docsite/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docsite/package-lock.json

      - name: Install dependencies
        working-directory: docsite
        run: npm ci

      - name: Build site
        working-directory: docsite
        run: npm run build
