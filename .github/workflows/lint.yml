name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npx eslint .

      - name: Lint Markdown
        run: npx markdownlint-cli2 '**/*.md' '#node_modules'

      - name: Validate JSON files
        run: node -e "const fs=require('fs');const glob=require('fs').readdirSync;console.log('Validating JSON...');require('child_process').execSync('find . -name \"*.json\" -not -path \"./node_modules/*\" -exec node -e \"JSON.parse(require(\\\"fs\\\").readFileSync(process.argv[1]))\" {} \\;',{stdio:'inherit'});console.log('All JSON valid');"
