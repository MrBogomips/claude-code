name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build marketplace.json
        run: npm run build

      - name: Check for marketplace.json drift
        run: |
          if ! git diff --exit-code .claude-plugin/marketplace.json; then
            echo "::error::marketplace.json has drifted from build output. Run 'npm run build' and commit the changes."
            exit 1
          fi

      - name: Validate plugins
        run: npm run validate

      - name: Run tests
        run: npm test
